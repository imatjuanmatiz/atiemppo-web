# ═══════════════════════════════════════
# ATIEMPPO — Jekyll Configuration
# ═══════════════════════════════════════
title: "ATIEMPPO — El puente entre tu negocio y la IA | Bogotá, Colombia"
description: "Acompañamos empresas a transformar sus operaciones con IA. Creadores de ATICA (+1.400 usuarios), SICETAC-LAB (+2.000 rutas) y AtiemppoX. +12 años, 9 países."
url: "https://atiemppo.com"
baseurl: ""
lang: "es-CO"
timezone: "America/Bogota"

# Author
author:
  name: "Juan Pablo Matiz"
  email: "juanmatiz@atiemppo.co"
  twitter: "@atiemppo"

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# AEO
llms_txt: /llms.txt

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
